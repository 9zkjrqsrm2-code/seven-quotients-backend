<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>七商管理后台 - 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  min-height:100vh;display:flex;align-items:center;justify-content:center
}
.login-card{
  background:rgba(255,255,255,.06);backdrop-filter:blur(20px);
  border-radius:20px;border:1px solid rgba(255,255,255,.1);
  padding:40px 36px;width:360px;box-shadow:0 25px 60px rgba(0,0,0,.5)
}
.login-card h1{color:#fff;font-size:24px;text-align:center;margin-bottom:8px}
.login-card p{color:rgba(255,255,255,.5);font-size:13px;text-align:center;margin-bottom:28px}
.form-group{margin-bottom:18px}
.form-group label{color:rgba(255,255,255,.7);font-size:13px;display:block;margin-bottom:6px}
.form-group input{
  width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);color:#fff;font-size:14px;outline:none;transition:.3s
}
.form-group input:focus{border-color:#6c5ce7;box-shadow:0 0 0 3px rgba(108,92,231,.2)}
.btn{
  width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;
  font-size:15px;font-weight:600;transition:.3s;margin-top:6px
}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(108,92,231,.35)}
.error{color:#ff7675;font-size:13px;text-align:center;margin-top:12px}
</style>
</head>
<body>
<div class="login-card">
  <h1>七商管理后台</h1>
  <p>请登录以管理测试系统和订单</p>
  <form method="post" action="/admin/login">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" name="username" required autofocus>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" name="password" required>
    </div>
    <button class="btn" type="submit">登录</button>
  </form>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
</div>
</body>
</html>
