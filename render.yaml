services:
  - type: web
    name: seven-quotients-api
    runtime: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: seven-quotients-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SITE_URL
        value: https://9zkjrqsrm2-code.github.io/seven-quotients-test
      - key: PAID_PRICE_CNY
        value: "2999"

databases:
  - name: seven-quotients-db
    plan: free
    region: singapore
    postgresMajorVersion: 16
    databaseName: sevenquotients
    ipAllowList: []
